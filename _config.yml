# Site wide configuration

title:            Nikola's Blog
locale:           en_US
# url:              //nshahpazov.github.io
url:              http://localhost:4000


# Jekyll configuration

permalink:   /:categories/:title/
markdown:    kramdown
highlighter: pygments
sass:
  sass_dir: _sass
  style: compressed
gems:
  - jekyll-sitemap

disqus_comments: true
comments :
  provider : disqus
  disqus :
    short_name : nikolasblog
  livefyre :
    site_id : 123
  intensedebate :
    account : 123abc
  facebook :
    appid : 123
    num_posts: 5
    width: 580
    colorscheme: light

analytics :
  provider : google
  google :
    tracking_id : UA-64788094-2
  getclicky :
  site_id :

kramdown:
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  use_coderay: true


# Site owner
owner:
  name: Nikola Shahpazov
  avatar: bw-smaller-cover.png
  bio: "FULL-STACK SOFTWARE ENGINEER"
  email: nshahpazov@gmail.com
  disqus-shortname: nshahpazov
  twitter: #username
  facebook: #username
  google:
    plus: nshahpazov
    analytics: UA-64788094-2
    verify:
    ad-client:
    ad-slot:
  bing-verify:
  github: nshahpazov
  stackoverflow: #http://stackoverflow.com/users/123456/username
  linkedin: nshahpazov
  xing: #username
  instagram: #username
  lastfm: #username
  tumblr: #username
  pinterest: #username
  foursquare: #username
  steam: #username
  dribbble: #username
  youtube: #username
  soundcloud: #username
  weibo: #username
  flickr: #username

include: [".htaccess"]
exclude: ["lib", "config.rb", "Capfile", "config", "log", "Rakefile", "Rakefile.rb", "tmp", "less", "*.sublime-project", "*.sublime-workspace", "test", "spec", "Gruntfile.js", "package.json", "node_modules", "Gemfile", "Gemfile.lock", "LICENSE", "README.md"]
